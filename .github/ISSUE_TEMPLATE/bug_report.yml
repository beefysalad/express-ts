name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can someone reproduce this?
      placeholder: |
        1. Run ...
        2. Call ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant logs, stack traces, or response bodies.
      render: shell

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.14.0"
    validations:
      required: true

  - type: input
    id: package-manager
    attributes:
      label: Package manager
      placeholder: "e.g. npm 10"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I can reproduce this with the latest version of the template
          required: true
